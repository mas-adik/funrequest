name = "fundrequest-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "fundrequest-db"
database_id = "YOUR_DATABASE_ID_HERE"
migrations_dir = "drizzle"

# Local Development
[env.local]
[env.local.d1_databases]
binding = "DB"
database_name = "fundrequest-db"
preview_database_id = "local"
