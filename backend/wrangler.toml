name = "vibe-saas-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "vibe-saas-db"
database_id = "YOUR_DATABASE_ID_HERE"
migrations_dir = "drizzle/migrations"

# Local development using SQLite
[env.local]
[env.local.d1_databases]
binding = "DB"
database_name = "vibe-saas-db"
preview_database_id = "local"
