services:
  # ── Backend API ────────────────────────────────────────────
  backend:
    image: ghcr.io/mas-adik/funrequest-backend:latest
    container_name: fundrequest-backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_PATH=/app/data/fundrequest.db
      - PORT=8787
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8787/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Expo Web + nginx) ────────────────────────────
  frontend:
    image: ghcr.io/mas-adik/funrequest-frontend:latest
    container_name: fundrequest-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

